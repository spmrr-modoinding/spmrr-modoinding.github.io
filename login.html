<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Paroki SPMRR Modoinding</title>
    <link href="logo-paroki2.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="login.css">
</head>
<body id="main-body">
    
    <div class="bg-overlay"></div>
    
    <div class="light-cone"></div>

    <div class="vintage-lamp-container" id="lamp-toggle">
        <div class="lamp-wire"></div>
        <div class="lamp-fixture"></div>
        <div class="lamp-glass">
            <div class="lamp-filament"></div>
        </div>
        <div class="lamp-glow"></div>
        <div class="lamp-hint" id="lamp-text">Login</div>
    </div>

    <div class="login-dock-container" id="dock-container">
        
        <div style="text-align: center;">
            <p id="error-message" class="error-message"></p>
        </div>
        
        <form id="login-form" class="login-dock glass-effect">
            
            <div class="dock-left">
                <div class="dock-logo">
                    <img src="logo-paroki.png" alt="Logo Paroki">
                </div>
                <div class="dock-title">
                    <h2>Admin Paroki</h2>
                    <p>SPMRR Modoinding</p>
                </div>
            </div>

            <div class="dock-center">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Email Admin" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
            </div>

            <div class="dock-right">
                <button type="submit" class="btn-login">
                    Masuk <i class="fas fa-sign-in-alt"></i>
                </button>
            </div>

        </form>
        
        <div class="dock-footer">
            <a href="index.html" class="back-link">
                <i class="fas fa-long-arrow-alt-left"></i> Kembali ke Beranda
            </a>
            <span class="copyright">&copy; 2026 Paroki Santa Perawan Maria Ratu Rosari Modoinding</span>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>

    <script>
        {
            const btnLampu = document.getElementById('lamp-toggle');
            const bdy = document.getElementById('main-body');
            const teksLampu = document.getElementById('lamp-text');
            const emailBox = document.getElementById('email');

            btnLampu.addEventListener('click', function() {
                bdy.classList.toggle('lights-on');
                
                if(bdy.classList.contains('lights-on')) {
                    setTimeout(function() { if(emailBox) emailBox.focus(); }, 1200);
                } else {
                    if(emailBox) emailBox.blur();
                }
            });
        }
    </script>
</body>
</html>
